# GoReleaser configuration for devctl
# Extends base.yaml settings.
project_name: devctl
version: 2

builds:
  - id: devctl
    dir: features/devctl
    main: ./cmd/devctl
    binary: devctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

dist: dist/devctl
